services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "kinozal_news"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kinozal_news"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kinozal_net

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      ADMIN_IDS: "${ADMIN_IDS}"
      ALLOW_MODE: "${ALLOW_MODE}"
      TMDB_TOKEN: "${TMDB_TOKEN}"
      MAGNET_BASE_URL: "${MAGNET_BASE_URL}"
      KINOZAL_USERNAME: "${KINOZAL_USERNAME}"
      KINOZAL_PASSWORD: "${KINOZAL_PASSWORD}"
      POLL_SECONDS: "${POLL_SECONDS}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT}"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      DISABLE_WEB_PAGE_PREVIEW: "${DISABLE_WEB_PAGE_PREVIEW}"
      BOOTSTRAP_AS_READ: "${BOOTSTRAP_AS_READ}"
      SOURCE_FETCH_LIMIT: "${SOURCE_FETCH_LIMIT}"
      CLEANUP_DUPLICATES_PREVIEW_LIMIT: "${CLEANUP_DUPLICATES_PREVIEW_LIMIT}"
      CLEANUP_VERSIONS_PREVIEW_LIMIT: "${CLEANUP_VERSIONS_PREVIEW_LIMIT}"
      CLEANUP_VERSIONS_KEEP_LAST: "${CLEANUP_VERSIONS_KEEP_LAST}"
      DEEP_LINK_BOT_USERNAME: "${DEEP_LINK_BOT_USERNAME}"
      TMDB_LANGUAGE: "${TMDB_LANGUAGE}"
      STARTUP_DB_RETRIES: "${STARTUP_DB_RETRIES}"
      STARTUP_DB_RETRY_DELAY: "${STARTUP_DB_RETRY_DELAY}"
      TMDB_CACHE_TTL: "${TMDB_CACHE_TTL}"
      ANIME_RESOLVER_ENABLED: "${ANIME_RESOLVER_ENABLED}"
      ANIME_RESOLVER_LOG_ONLY: "${ANIME_RESOLVER_LOG_ONLY}"
      ANIME_MAPPINGS_DIR: "${ANIME_MAPPINGS_DIR}"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*app.py' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kinozal_net

  api:
    build: .
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      ADMIN_IDS: "${ADMIN_IDS}"
      ALLOW_MODE: "${ALLOW_MODE}"
      TMDB_TOKEN: "${TMDB_TOKEN}"
      KINOZAL_USERNAME: "${KINOZAL_USERNAME}"
      KINOZAL_PASSWORD: "${KINOZAL_PASSWORD}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT}"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      TMDB_LANGUAGE: "${TMDB_LANGUAGE}"
      STARTUP_DB_RETRIES: "${STARTUP_DB_RETRIES}"
      STARTUP_DB_RETRY_DELAY: "${STARTUP_DB_RETRY_DELAY}"
      TMDB_CACHE_TTL: "${TMDB_CACHE_TTL}"
      ANIME_RESOLVER_ENABLED: "${ANIME_RESOLVER_ENABLED}"
      ANIME_RESOLVER_LOG_ONLY: "${ANIME_RESOLVER_LOG_ONLY}"
      ANIME_MAPPINGS_DIR: "${ANIME_MAPPINGS_DIR}"
      SOURCE_ERROR_ALERT_THRESHOLD: "${SOURCE_ERROR_ALERT_THRESHOLD}"
      SOURCE_ERROR_ALERT_REPEAT_MINUTES: "${SOURCE_ERROR_ALERT_REPEAT_MINUTES}"
      API_HOST: "${API_HOST:-0.0.0.0}"
      API_PORT: "${API_PORT:-8000}"
      ADMIN_HTTP_TOKEN: "${ADMIN_HTTP_TOKEN:-}"
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kinozal_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    networks:
      - kinozal_net

  magnet-web:
    build: .
    command: ["python", "magnet_redirect_server.py"]
    restart: unless-stopped
    ports:
      - "${MAGNET_WEB_PORT:-8081}:8081"
    volumes:
      - .:/app
    environment:
      MAGNET_REDIRECT_PORT: "8081"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - magnet-web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      api:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - kinozal_net

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-change_me_monitoring_password}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - kinozal_net

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-kinozal_bot_postgres_data}"

networks:
  kinozal_net:
    driver: bridge

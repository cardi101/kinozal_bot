services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "kinozal_news"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kinozal_news"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kinozal_net

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      ADMIN_IDS: "${ADMIN_IDS}"
      ALLOW_MODE: "${ALLOW_MODE}"
      TMDB_TOKEN: "${TMDB_TOKEN}"
      MAGNET_BASE_URL: "${MAGNET_BASE_URL}"
      KINOZAL_USERNAME: "${KINOZAL_USERNAME}"
      KINOZAL_PASSWORD: "${KINOZAL_PASSWORD}"
      POLL_SECONDS: "${POLL_SECONDS}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT}"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      DISABLE_WEB_PAGE_PREVIEW: "${DISABLE_WEB_PAGE_PREVIEW}"
      BOOTSTRAP_AS_READ: "${BOOTSTRAP_AS_READ}"
      SOURCE_FETCH_LIMIT: "${SOURCE_FETCH_LIMIT}"
      CLEANUP_DUPLICATES_PREVIEW_LIMIT: "${CLEANUP_DUPLICATES_PREVIEW_LIMIT}"
      CLEANUP_VERSIONS_PREVIEW_LIMIT: "${CLEANUP_VERSIONS_PREVIEW_LIMIT}"
      CLEANUP_VERSIONS_KEEP_LAST: "${CLEANUP_VERSIONS_KEEP_LAST}"
      DEEP_LINK_BOT_USERNAME: "${DEEP_LINK_BOT_USERNAME}"
      TMDB_LANGUAGE: "${TMDB_LANGUAGE}"
      STARTUP_DB_RETRIES: "${STARTUP_DB_RETRIES}"
      STARTUP_DB_RETRY_DELAY: "${STARTUP_DB_RETRY_DELAY}"
      TMDB_CACHE_TTL: "${TMDB_CACHE_TTL}"
      ANIME_RESOLVER_ENABLED: "${ANIME_RESOLVER_ENABLED}"
      ANIME_RESOLVER_LOG_ONLY: "${ANIME_RESOLVER_LOG_ONLY}"
      ANIME_MAPPINGS_DIR: "${ANIME_MAPPINGS_DIR}"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*app.py' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kinozal_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    networks:
      - kinozal_net

  magnet-web:
    build: .
    command: ["python", "magnet_redirect_server.py"]
    restart: unless-stopped
    ports:
      - "${MAGNET_WEB_PORT:-8081}:8081"
    volumes:
      - .:/app
    environment:
      MAGNET_REDIRECT_PORT: "8081"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - magnet-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

  postgres_data:

networks:
  kinozal_net:
    driver: bridge

global:
  resolve_timeout: 5m

route:
  receiver: telegram_admins
  group_by:
    - alertname
    - severity
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: telegram_admins
    webhook_configs:
      - url: http://alert-webhook:8010/webhooks/alertmanager
        send_resolved: true

[mypy]
python_version = 3.12
ignore_missing_imports = True
follow_imports = silent
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
pretty = True
files =
    delivery_events.py,
    parsed_release.py,
    quiet_hours.py,
    subscription_matching.py,
    tmdb_match_features.py,
    services/subscription_service.py

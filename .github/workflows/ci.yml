name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-smoke:
    name: Integration Smoke
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: "123456:TESTTOKEN"
      ADMIN_IDS: "1"
      ALLOW_MODE: "invite"
      TMDB_TOKEN: ""
      MAGNET_BASE_URL: ""
      KINOZAL_USERNAME: "smoke"
      KINOZAL_PASSWORD: "smoke"
      POLL_SECONDS: "3600"
      REQUEST_TIMEOUT: "10"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/kinozal_news"
      REDIS_URL: "redis://redis:6379/0"
      DISABLE_WEB_PAGE_PREVIEW: "1"
      BOOTSTRAP_AS_READ: "1"
      SOURCE_FETCH_LIMIT: "5"
      CLEANUP_DUPLICATES_PREVIEW_LIMIT: "15"
      CLEANUP_VERSIONS_PREVIEW_LIMIT: "15"
      CLEANUP_VERSIONS_KEEP_LAST: "3"
      DEEP_LINK_BOT_USERNAME: "smoke_bot"
      TMDB_LANGUAGE: "ru-RU"
      STARTUP_DB_RETRIES: "15"
      STARTUP_DB_RETRY_DELAY: "1"
      TMDB_CACHE_TTL: "3600"
      ANIME_RESOLVER_ENABLED: "0"
      ANIME_RESOLVER_LOG_ONLY: "1"
      ANIME_MAPPINGS_DIR: "data/anime-mappings"
      SOURCE_ERROR_ALERT_THRESHOLD: "3"
      SOURCE_ERROR_ALERT_REPEAT_MINUTES: "180"
      API_HOST: "0.0.0.0"
      API_PORT: "18000"
      ADMIN_HTTP_TOKEN: "smoke-admin-token"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_VOLUME_NAME: "kinozal_ci_postgres_${{ github.run_id }}"
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Start postgres, redis, and api
        run: docker compose up -d --build postgres redis api

      - name: Wait for api health
        run: |
          for attempt in $(seq 1 20); do
            if docker compose exec -T api curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "API healthcheck did not pass in time" >&2
          exit 1

      - name: Verify migrations table
        run: docker compose exec -T postgres psql -U postgres -d kinozal_news -c "select version, name from schema_migrations order by version;"

      - name: Smoke-check bootstrap paths
        run: |
          docker compose exec -T api python smoke_bootstrap.py api
          docker compose exec -T api python smoke_bootstrap.py app

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color postgres redis api

      - name: Stop compose stack
        if: always()
        run: docker compose down -v --remove-orphans
